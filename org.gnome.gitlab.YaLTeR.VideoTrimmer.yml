app-id: org.gnome.gitlab.YaLTeR.VideoTrimmer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: video-trimmer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    RUSTFLAGS: -C force-frame-pointers=yes
modules:
  - name: video-trimmer
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/YaLTeR/video-trimmer.git
        commit: 013bfa4bf9beb06f2518b6104e100fd7b927ad82
      # Generated with flatpak-cargo-generator.py
      - cargo-sources.json
      - type: shell
        commands:
          - mkdir .cargo
          - cp cargo/config .cargo/
